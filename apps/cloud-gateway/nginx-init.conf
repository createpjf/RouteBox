# Temporary nginx config for initial SSL certificate issuance.
# Used only during first deployment. After certbot obtains certs,
# switch to nginx.conf (with SSL) and restart nginx.

server {
    listen 80;
    server_name api.routebox.dev;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    # Proxy to gateway (HTTP only during initial setup)
    location / {
        proxy_pass http://gateway:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }
}
