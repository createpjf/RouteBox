groups:
  - name: cloud-gateway
    rules:
      # ── Error rate alert ──────────────────────────────────────────────
      - alert: HighErrorRate
        expr: rate(errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Error rate > 5% for 2 minutes"
          description: "The cloud gateway is experiencing elevated error rates."

      # ── Latency alert ─────────────────────────────────────────────────
      - alert: HighLatencyP99
        expr: histogram_quantile(0.99, rate(http_request_duration_ms_bucket[5m])) > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 latency > 5s for 5 minutes"
          description: "The cloud gateway P99 latency has exceeded 5 seconds."

      # ── Rate limiting alert ───────────────────────────────────────────
      - alert: HighRateLimiting
        expr: rate(rate_limit_hits_total[5m]) > 1
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Sustained rate limiting activity"
          description: "Rate limiting is actively rejecting requests for over 5 minutes."

      # ── Provider latency alert ────────────────────────────────────────
      - alert: ProviderHighLatency
        expr: histogram_quantile(0.95, rate(provider_request_duration_ms_bucket[5m])) > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Provider P95 latency > 10s for 5 minutes"
          description: "Upstream LLM provider responses are taking too long."

      # ── Gateway down alert ──────────────────────────────────────────
      - alert: GatewayDown
        expr: up{job="cloud-gateway"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Cloud gateway is down"
          description: "The cloud gateway health check has been failing for over 1 minute."

      # ── All providers failing ───────────────────────────────────────
      - alert: AllProvidersFailing
        expr: rate(errors_total{type="all_providers_failed"}[5m]) > 0.01
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "All LLM providers are failing"
          description: "No provider can serve requests — all fallbacks exhausted."

      # ── Stream abort rate ───────────────────────────────────────────
      - alert: HighStreamAbortRate
        expr: rate(stream_aborted_total[5m]) / rate(http_requests_total{method="POST"}[5m]) > 0.3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Stream abort rate > 30%"
          description: "A high percentage of streaming requests are being aborted by clients."

      # ── Database health ─────────────────────────────────────────────
      - alert: DatabaseUnhealthy
        expr: up{job="postgres"} == 0 or pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database is unreachable"
          description: "PostgreSQL health check has been failing for over 1 minute."
