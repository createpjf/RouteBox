global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert-rules.yml"

scrape_configs:
  - job_name: "cloud-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:3001"]
