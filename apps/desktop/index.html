<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RouteBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      html, body { background: transparent; margin: 0; padding: 0; overflow: hidden; }
    </style>
    <script>
      // Sync theme before first paint to avoid FOUC (F7)
      (function() {
        try {
          var t = localStorage.getItem('routebox-theme') || 'dark';
          document.documentElement.dataset.themeMode = t;
          if (t === 'auto') {
            document.documentElement.dataset.theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          } else {
            document.documentElement.dataset.theme = t;
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
